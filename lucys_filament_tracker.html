<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Lucy's Filament Tracker</title>
    <!-- Version 1.7, Last Update: 2026-02-23 -->

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Prevent selection during fast clicks */
        .no-select { user-select: none; }

        /* PRINT STYLES */
        @media print {
            body * {
                visibility: hidden;
            }
            #printable-content, #printable-content * {
                visibility: visible;
            }
            #printable-content {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white;
                padding: 0;
                margin: 0;
            }
            .no-print {
                display: none !important;
            }
            body {
                background: white;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // PASTE YOUR BASE64 IMAGE STRING INSIDE THE QUOTES BELOW
        // Example: const APP_ICON = ""; 
        const APP_ICON = "";

        /* ================================================================================== */

        /* --- INTERNAL ICON LIBRARY --- */
        const IconBase = ({ children, size = 24, className = "", ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className} 
                {...props}
            >
                {children}
            </svg>
        );

        const Plus = (p) => <IconBase {...p}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const Search = (p) => <IconBase {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
        const Upload = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></IconBase>;
        const Trash2 = (p) => <IconBase {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>;
        const Edit2 = (p) => <IconBase {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>;
        const Package = (p) => <IconBase {...p}><path d="m16.5 9.4-9-5.19"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></IconBase>;
        const Disc = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const DollarSign = (p) => <IconBase {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconBase>;
        const Filter = (p) => <IconBase {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>;
        const Download = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconBase>;
        const ChevronDown = (p) => <IconBase {...p}><path d="m6 9 6 6 6-6"/></IconBase>;
        const ChevronUp = (p) => <IconBase {...p}><path d="m18 15-6-6-6 6"/></IconBase>;
        const Scale = (p) => <IconBase {...p}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></IconBase>;
        const StickyNote = (p) => <IconBase {...p}><path d="M15.5 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6"/></IconBase>;
        const AlertTriangle = (p) => <IconBase {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></IconBase>;
        const RotateCcw = (p) => <IconBase {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;
        const HardDrive = (p) => <IconBase {...p}><line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/></IconBase>;
        const XCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></IconBase>;
        const Printer = (p) => <IconBase {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></IconBase>;
        const ArrowDownAZ = (p) => <IconBase {...p}><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="M15 4h5l-5 6h5"/><path d="M15 20v-3.5a2.5 2.5 0 0 1 5 0V20"/><path d="M15 18h5"/></IconBase>;
        const Truck = (p) => <IconBase {...p}><path d="M5 18H3c-.6 0-1-.4-1-1V7c0-.6.4-1 1-1h10c.6 0 1 .4 1 1v11"/><path d="M14 9h4l4 4v5c0 .6-.4 1-1 1h-2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></IconBase>;
        const MapPin = (p) => <IconBase {...p}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconBase>;

        // --- Mock Data ---
        const INITIAL_DATA = [
            {
                id: '1',
                brand: 'Bambu Lab',
                type: 'PLA Basic',
                colorName: 'SAMPLE ENTRY - Bambu Green',
                hexColor: '#00AE42',
                fullRolls: 2,
                orderedRolls: 1, 
                partials: [
                    { id: 'p1', weight: 450, note: 'Main printer' },
                    { id: 'p2', weight: 120, note: 'Scrap' }
                ],
                price: 24.99,
                spoolWeight: 250,
                location: 'Shelf 2, Bin A',
                notes: 'Prints great at standard speeds.'
            }
        ];

        // --- Components ---

        const StatCard = ({ title, value, icon: Icon, subtext }) => (
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div className="p-3 bg-indigo-50 rounded-lg text-indigo-600">
                    <Icon size={24} />
                </div>
                <div>
                    <p className="text-sm text-slate-500 font-medium">{title}</p>
                    <h3 className="text-2xl font-bold text-slate-800">{value}</h3>
                    {subtext && <p className="text-xs text-slate-600">{subtext}</p>}
                </div>
            </div>
        );

        const FilamentCard = ({ item, onEdit, onDeleteRequest, onUpdate }) => {
            const [isExpanded, setIsExpanded] = useState(false);

            const totalPartialWeight = item.partials?.reduce((acc, p) => acc + (parseInt(p.weight) || 0), 0) || 0;

            const handleOpenRoll = () => {
                if (item.fullRolls > 0) {
                    const newPartial = { id: crypto.randomUUID(), weight: 1000, note: 'Freshly opened' };
                    onUpdate({
                        ...item,
                        fullRolls: item.fullRolls - 1,
                        partials: [...(item.partials || []), newPartial]
                    });
                    setIsExpanded(true); 
                }
            };

            const addManualPartial = () => {
                const newPartial = { id: crypto.randomUUID(), weight: 1000, note: '' };
                onUpdate({
                    ...item,
                    partials: [...(item.partials || []), newPartial]
                });
            };

            const updatePartial = (partialId, field, value) => {
                const updatedPartials = item.partials.map(p => 
                    p.id === partialId ? { ...p, [field]: value } : p
                );
                onUpdate({ ...item, partials: updatedPartials });
            };

            const deletePartial = (partialId) => {
                const updatedPartials = item.partials.filter(p => p.id !== partialId);
                onUpdate({ ...item, partials: updatedPartials });
            };

            return (
                <div 
                    className="bg-white rounded-xl shadow-sm border-2 hover:shadow-md transition-all flex flex-col overflow-hidden relative group"
                    style={{ borderColor: item.hexColor }}
                >
                    <div className="h-3 w-full" style={{ backgroundColor: item.hexColor }} />

                    <div className="p-5 flex-1 flex flex-col space-y-4">
                        <div className="flex justify-between items-start">
                            <div>
                                <h3 className="font-bold text-slate-800 text-lg leading-tight">{item.colorName}</h3>
                                <p className="text-slate-500 text-sm">{item.brand} • {item.type}</p>
                            </div>
                            <div className="flex flex-col items-end space-y-2">
                                <div 
                                    className="w-8 h-8 rounded-full shadow-inner border border-slate-100 flex-shrink-0"
                                    style={{ backgroundColor: item.hexColor }}
                                    title={item.hexColor}
                                />
                                {item.orderedRolls > 0 && (
                                    <div 
                                        className="flex items-center text-[10px] font-bold text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded border border-amber-200 shadow-sm"
                                        title={`${item.orderedRolls} rolls currently on order`}
                                    >
                                        <Truck size={10} className="mr-1" /> {item.orderedRolls}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3 text-sm">
                            <div className="bg-slate-50 p-2 rounded-lg text-center">
                                <span className="block text-xs text-slate-700 uppercase font-bold tracking-wider mb-1">Full Rolls</span>
                                <span className="font-mono font-bold text-lg text-slate-700">{item.fullRolls}</span>
                            </div>
                            <div 
                                className={`bg-slate-50 p-2 rounded-lg text-center cursor-pointer hover:bg-slate-100 transition-colors ${isExpanded ? 'ring-2 ring-indigo-100' : ''}`}
                                onClick={() => setIsExpanded(!isExpanded)}
                            >
                                <span className="block text-xs text-slate-700 uppercase font-bold tracking-wider mb-1">Open</span>
                                <div className="flex items-center justify-center space-x-1">
                                    <span className="font-mono font-bold text-lg text-slate-700">{item.partials?.length || 0}</span>
                                    <span className="text-xs text-slate-700">({totalPartialWeight}g)</span>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-2 pt-2 border-t border-slate-100">
                           {item.notes ? (
                             <div className="bg-yellow-50 p-2 rounded text-xs text-slate-600 flex items-start">
                               <StickyNote size={14} className="text-yellow-500 mr-2 flex-shrink-0 mt-0.5" />
                               <p className="line-clamp-2">{item.notes}</p>
                             </div>
                           ) : (
                             <div className="text-xs text-slate-500 italic py-1">No notes added</div>
                           )}
                           
                           <div className="flex items-center justify-between text-xs text-slate-600 mt-1">
                              <button 
                                  onClick={() => onUpdate({
                                      ...item,
                                      orderedRolls: (parseInt(item.orderedRolls) || 0) + 1
                                  })}
                                  className="flex items-center text-indigo-600 hover:text-indigo-800 transition-colors px-1.5 py-0.5 rounded hover:bg-indigo-50 border border-transparent hover:border-indigo-100"
                                  title="Quick add 1 roll to order list"
                              >
                                  <Plus size={10} className="mr-1" /> Order Roll
                              </button>
                              <div className="flex items-center">
                                  <Scale size={12} className="mr-1" />
                                  <span>Spool Tare: {item.spoolWeight}g</span>
                              </div>
                           </div>
                        </div>
                    </div>

                    {isExpanded && (
                        <div className="bg-slate-50 border-t border-slate-200 p-3 animate-in slide-in-from-top-2 duration-200">
                            <div className="flex justify-between items-center mb-2">
                                <h4 className="text-xs font-bold text-slate-700 uppercase tracking-wider">Active Spools</h4>
                                <button 
                                    onClick={addManualPartial}
                                    className="text-xs flex items-center text-indigo-600 hover:text-indigo-800 bg-white border border-indigo-100 px-2 py-1 rounded"
                                >
                                    <Plus size={12} className="mr-1"/> Add
                                </button>
                            </div>
                            
                            <div className="space-y-2 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                                {item.partials && item.partials.length > 0 ? (
                                    item.partials.map((partial) => (
                                        <div key={partial.id} className="flex items-center space-x-2 bg-white p-2 rounded border border-slate-200 shadow-sm">
                                            <div className="flex-1">
                                                 <div className="flex items-center space-x-1 mb-1">
                                                     <Scale size={12} className="text-slate-600"/>
                                                     <input 
                                                        type="number" 
                                                        value={partial.weight}
                                                        onChange={(e) => updatePartial(partial.id, 'weight', parseInt(e.target.value) || 0)}
                                                        className="w-16 p-0 text-sm font-mono font-bold text-slate-700 border-none focus:ring-0 bg-transparent"
                                                     />
                                                     <span className="text-xs text-slate-600">g</span>
                                                 </div>
                                                 <input 
                                                    type="text" 
                                                    value={partial.note || ''}
                                                    onChange={(e) => updatePartial(partial.id, 'note', e.target.value)}
                                                    placeholder="Note"
                                                    className="w-full text-xs text-slate-500 border-none p-0 focus:ring-0 placeholder:text-slate-300"
                                                 />
                                            </div>
                                            <button 
                                                onClick={() => deletePartial(partial.id)}
                                                className="text-slate-400 hover:text-rose-500 p-1"
                                            >
                                                <Trash2 size={14} />
                                            </button>
                                        </div>
                                    ))
                                ) : (
                                    <div className="text-center py-2 text-xs text-slate-600 italic">
                                        No open rolls listed.
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className="bg-slate-50 p-3 flex items-center justify-between border-t border-slate-200">
                        <div className="flex items-center space-x-2">
                            {item.fullRolls > 0 ? (
                                <button 
                                    onClick={handleOpenRoll}
                                    className="text-xs font-medium text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-md transition-colors flex items-center"
                                    title="Convert 1 Full Roll to a 1000g Partial"
                                >
                                    <Package size={14} className="mr-1.5"/>
                                    Open
                                </button>
                            ) : (
                                !item.orderedRolls && <span className="text-xs text-slate-500 italic px-3">No full rolls</span>
                            )}
                            
                            {item.orderedRolls > 0 && (
                                <button 
                                    onClick={() => onUpdate({
                                        ...item, 
                                        fullRolls: (parseInt(item.fullRolls) || 0) + (parseInt(item.orderedRolls) || 0), 
                                        orderedRolls: 0
                                    })}
                                    className="text-xs font-medium text-emerald-600 hover:text-emerald-800 bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-md transition-colors flex items-center shadow-sm border border-emerald-200"
                                    title="Mark Ordered Rolls as Received"
                                >
                                    <Truck size={14} className="mr-1.5"/>
                                    Receive
                                </button>
                            )}
                        </div>

                        {/* Location Badge (Centered) */}
                        {item.location && (
                            <div 
                                className="flex items-center text-xs text-slate-500 mx-2 truncate max-w-[80px] sm:max-w-[100px]" 
                                title={item.location}
                            >
                                <MapPin size={12} className="mr-1 flex-shrink-0" />
                                <span className="truncate">{item.location}</span>
                            </div>
                        )}

                        <div className="flex space-x-1 items-center">
                            <button 
                                onClick={() => setIsExpanded(!isExpanded)}
                                className="p-1.5 text-slate-400 hover:text-slate-700 hover:bg-slate-200 rounded-md transition-colors"
                                title={isExpanded ? "Collapse Partials" : "Manage Partials"}
                            >
                                {isExpanded ? <ChevronUp size={16} /> : <ChevronDown size={16} />}
                            </button>
                            <div className="w-px h-4 bg-slate-200 mx-1"></div>
                            <button 
                                onClick={() => onEdit(item)}
                                className="p-1.5 text-slate-400 hover:text-slate-700 hover:bg-slate-200 rounded-md transition-colors"
                            >
                                <Edit2 size={16} />
                            </button>
                            <button 
                                onClick={() => onDeleteRequest(item)}
                                className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-md transition-colors"
                            >
                                <Trash2 size={16} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---

        const App = () => {
            const [inventory, setInventory] = useState(() => {
                try {
                    const savedData = localStorage.getItem('lucy_filament_inventory_v1');
                    return savedData ? JSON.parse(savedData) : INITIAL_DATA;
                } catch (error) {
                    return INITIAL_DATA;
                }
            });

            const [lastSavedState, setLastSavedState] = useState(() => JSON.stringify(inventory));

            const isDirty = useMemo(() => {
                return JSON.stringify(inventory) !== lastSavedState;
            }, [inventory, lastSavedState]);

            useEffect(() => {
                if (APP_ICON) {
                    let link = document.querySelector("link[rel~='icon']");
                    if (!link) {
                        link = document.createElement('link');
                        link.rel = 'icon';
                        document.getElementsByTagName('head')[0].appendChild(link);
                    }
                    link.href = APP_ICON;
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('lucy_filament_inventory_v1', JSON.stringify(inventory));
            }, [inventory]);

            const [showForm, setShowForm] = useState(false);
            const [showPrintModal, setShowPrintModal] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [showClearConfirm, setShowClearConfirm] = useState(false);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [brandFilter, setBrandFilter] = useState('');
            const [typeFilter, setTypeFilter] = useState('');
            const [sortOption, setSortOption] = useState('brand-type-color'); 

            const defaultFormState = { brand: '', type: 'PLA', colorName: '', hexColor: '#000000', location: '', fullRolls: 1, orderedRolls: 0, partials: [], price: 19.99, spoolWeight: 250, notes: '' };
            const [formData, setFormData] = useState(defaultFormState);

            const availableBrands = useMemo(() => {
                let filtered = inventory;
                if (typeFilter) filtered = filtered.filter(item => item.type === typeFilter);
                return [...new Set(filtered.map(item => item.brand))].sort();
            }, [inventory, typeFilter]);

            const availableTypes = useMemo(() => {
                let filtered = inventory;
                if (brandFilter) filtered = filtered.filter(item => item.brand === brandFilter);
                return [...new Set(filtered.map(item => item.type))].sort();
            }, [inventory, brandFilter]);

            const stats = useMemo(() => {
                const totalFull = inventory.reduce((acc, item) => acc + (parseInt(item.fullRolls) || 0), 0);
                const totalValue = inventory.reduce((acc, item) => {
                    const price = parseFloat(item.price) || 0;
                    const fullValue = (parseInt(item.fullRolls) || 0) * price;
                    const itemPartialWeightGrams = item.partials?.reduce((pAcc, p) => pAcc + (parseInt(p.weight) || 0), 0) || 0;
                    const partialValue = (itemPartialWeightGrams / 1000) * price;
                    return acc + fullValue + partialValue;
                }, 0);
                return { totalFull, totalValue };
            }, [inventory]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleInventoryUpdate = (updatedItem) => {
                setInventory(prev => prev.map(item => item.id === updatedItem.id ? updatedItem : item));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingId) {
                    setInventory(prev => prev.map(item => item.id === editingId ? { ...formData, id: editingId } : item));
                } else {
                    setInventory(prev => [...prev, { ...formData, id: crypto.randomUUID() }]);
                }
                closeForm();
            };

            const handleEdit = (item) => {
                setFormData(item);
                setEditingId(item.id);
                setShowForm(true);
            };

            const exportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(inventory, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "lucy_inventory.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                setLastSavedState(JSON.stringify(inventory));
            };

            const importData = (event) => {
                const fileReader = new FileReader();
                const file = event.target.files[0];
                if(file){
                    fileReader.readAsText(file, "UTF-8");
                    fileReader.onload = e => {
                        try {
                            const parsedData = JSON.parse(e.target.result);
                            if (Array.isArray(parsedData)) {
                                setInventory(parsedData);
                                setLastSavedState(JSON.stringify(parsedData));
                            }
                            else alert("Invalid JSON format");
                        } catch (error) { alert("Error reading file"); }
                        event.target.value = null;
                    };
                }
            };

            const filteredInventory = useMemo(() => {
                let result = inventory.filter(item => {
                    const searchLower = searchTerm.toLowerCase();
                    
                    const matchesBrand = item.brand.toLowerCase().includes(searchLower);
                    const matchesColor = item.colorName.toLowerCase().includes(searchLower);
                    const matchesType = item.type.toLowerCase().includes(searchLower);
                    
                    const matchesMainNote = item.notes ? item.notes.toLowerCase().includes(searchLower) : false;
                    const matchesLocation = item.location ? item.location.toLowerCase().includes(searchLower) : false;
                    
                    const matchesPartialNote = item.partials ? item.partials.some(partial => 
                        partial.note && partial.note.toLowerCase().includes(searchLower)
                    ) : false;

                    const matchesSearch = matchesBrand || matchesColor || matchesType || matchesMainNote || matchesLocation || matchesPartialNote;
                    
                    const matchesBrandFilter = brandFilter ? item.brand === brandFilter : true;
                    const matchesTypeFilter = typeFilter ? item.type === typeFilter : true;
                    
                    return matchesSearch && matchesBrandFilter && matchesTypeFilter;
                });

                result.sort((a, b) => {
                    if (sortOption === 'brand-type-color') {
                        return a.brand.localeCompare(b.brand) || a.type.localeCompare(b.type) || a.colorName.localeCompare(b.colorName);
                    } else if (sortOption === 'inventory-low-to-high') {
                        const orderedA = parseInt(a.orderedRolls) || 0;
                        const orderedB = parseInt(b.orderedRolls) || 0;
                        if (orderedA > 0 && orderedB === 0) return -1;
                        if (orderedB > 0 && orderedA === 0) return 1;

                        const weightA = (a.fullRolls * 1000) + (a.partials?.reduce((acc, p) => acc + (parseInt(p.weight) || 0), 0) || 0);
                        const weightB = (b.fullRolls * 1000) + (b.partials?.reduce((acc, p) => acc + (parseInt(p.weight) || 0), 0) || 0);
                        return a.fullRolls - b.fullRolls || weightA - weightB;
                    } else if (sortOption === 'color-type-brand') {
                        return a.colorName.localeCompare(b.colorName) || a.type.localeCompare(b.type) || a.brand.localeCompare(b.brand);
                    }
                    return 0;
                });
                return result;
            }, [inventory, searchTerm, brandFilter, typeFilter, sortOption]);

            const filteredStats = useMemo(() => {
                const value = filteredInventory.reduce((acc, item) => {
                    const price = parseFloat(item.price) || 0;
                    const fullV = (parseInt(item.fullRolls) || 0) * price;
                    const partialW = item.partials?.reduce((pAcc, p) => pAcc + (parseInt(p.weight) || 0), 0) || 0;
                    return acc + fullV + ((partialW / 1000) * price);
                }, 0);
                return { value };
            }, [filteredInventory]);

            const closeForm = () => { setShowForm(false); setEditingId(null); setFormData(defaultFormState); };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-900 text-white shadow-lg sticky top-0 z-10 no-print">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center space-y-4 sm:space-y-0">
                            <div className="flex items-center space-x-3">
                                <div className="p-2 bg-indigo-500 rounded-lg">
                                    {APP_ICON ? (
                                        <img src={APP_ICON} className="w-12 h-12 object-contain rounded-lg" />
                                    ) : (
                                        <Package size={24} className="text-white" />
                                    )}
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold leading-none">Lucy's Filament Tracker</h1>
                                    <div className="flex items-center space-x-2 mt-1">
                                        {isDirty ? (
                                            <span className="text-[10px] bg-amber-900 text-amber-200 px-1.5 py-0.5 rounded border border-amber-700 flex items-center font-bold">
                                                <AlertTriangle size={10} className="mr-1" /> Unsaved Changes
                                            </span>
                                        ) : (
                                            <span className="text-[10px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded border border-slate-700 flex items-center">
                                                <HardDrive size={10} className="mr-1" /> Local Storage
                                            </span>
                                        )}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex items-center space-x-2 w-full sm:w-auto">
                                <button onClick={() => setShowClearConfirm(true)} className="p-2 text-slate-400 hover:text-red-200 hover:bg-red-900/50 rounded-lg transition-colors"><Trash2 size={20} /></button>
                                <div className="w-px h-6 bg-slate-700 mx-2 hidden sm:block"></div>
                                <button onClick={() => setShowPrintModal(true)} className="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded-lg text-sm font-medium"><Printer size={16} /> <span>Print</span></button>
                                
                                <button 
                                    onClick={exportData} 
                                    className={`flex items-center space-x-2 px-3 py-2 rounded-lg text-sm font-medium transition-all ${
                                        isDirty 
                                            ? 'bg-amber-600 hover:bg-amber-500 text-white shadow-[0_0_10px_rgba(217,119,6,0.4)] ring-2 ring-amber-400 ring-offset-2 ring-offset-slate-900' 
                                            : 'bg-slate-800 hover:bg-slate-700 text-slate-300'
                                    }`}
                                >
                                    <Download size={16} /> <span>Save JSON</span>
                                </button>

                                <label className="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded-lg text-sm font-medium cursor-pointer">
                                    <Upload size={16} /> <span>Load JSON</span>
                                    <input type="file" className="hidden" onChange={importData} accept=".json" />
                                </label>
                                <div className="w-px h-6 bg-slate-700 mx-2 hidden sm:block"></div>
                                <button onClick={() => setShowForm(true)} className="flex-1 sm:flex-none flex items-center justify-center space-x-2 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium transition-all shadow-md active:scale-95"><Plus size={18} /> <span>Add</span></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 space-y-8 no-print">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <StatCard title="Total Full Rolls" value={stats.totalFull} icon={Disc} subtext="Ready to print" />
                            <StatCard title="Total Filaments" value={inventory.length} icon={Package} subtext="Variety in stock" />
                            <StatCard title="Inventory Value" value={`$${stats.totalValue.toFixed(2)}`} icon={DollarSign} subtext="Based on current price" />
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-4">
                            <div className="flex flex-col md:flex-row gap-4 items-center">
                                <div className="relative w-full md:w-1/4">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"><Filter size={16} /></div>
                                    <select value={brandFilter} onChange={(e) => setBrandFilter(e.target.value)} className="w-full pl-9 pr-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white outline-none appearance-none cursor-pointer">
                                        <option value="">All Brands</option>
                                        {availableBrands.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"><ChevronDown size={14} /></div>
                                </div>
                                <div className="relative w-full md:w-1/5">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"><Filter size={16} /></div>
                                    <select value={typeFilter} onChange={(e) => setTypeFilter(e.target.value)} className="w-full pl-9 pr-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white outline-none appearance-none cursor-pointer">
                                        <option value="">All Types</option>
                                        {availableTypes.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"><ChevronDown size={14} /></div>
                                </div>
                                <div className="relative flex-1 w-full">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><Search size={20} /></div>
                                    <input type="text" placeholder="Search filaments, notes, or location..." className="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-200 outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                <div className="relative w-full md:w-1/5">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"><ArrowDownAZ size={16} /></div>
                                    <select value={sortOption} onChange={(e) => setSortOption(e.target.value)} className="w-full pl-9 pr-4 py-2.5 rounded-lg border border-slate-200 bg-indigo-50 font-medium text-indigo-700 outline-none appearance-none cursor-pointer">
                                        <option value="brand-type-color">Brand, Type, Color</option>
                                        <option value="inventory-low-to-high">Order View (Low Stock First)</option>
                                        <option value="color-type-brand">Color, Type, Brand</option>
                                    </select>
                                    <div className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"><ChevronDown size={14} /></div>
                                </div>
                            </div>
                            <div className="flex items-center justify-between text-xs text-slate-500 px-1">
                                <span>Showing <strong>{filteredInventory.length}</strong> of {inventory.length} spools — <strong>Filtered Value: ${filteredStats.value.toFixed(2)}</strong></span>
                                {(brandFilter || typeFilter || searchTerm) && (
                                    <button onClick={() => { setBrandFilter(''); setTypeFilter(''); setSearchTerm(''); }} className="text-indigo-600 hover:underline flex items-center"><RotateCcw size={10} className="mr-1" /> Reset Filters</button>
                                )}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {filteredInventory.map(item => (
                                <FilamentCard key={item.id} item={item} onEdit={handleEdit} onDeleteRequest={setDeleteTarget} onUpdate={handleInventoryUpdate} />
                            ))}
                        </div>
                        
                        <div className="flex justify-end pt-4 border-t border-slate-200">
                             <span className="text-[10px] text-slate-400 font-mono select-none">v1.7</span>
                        </div>
                    </main>

                    {showPrintModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm cursor-pointer" id="printable-content" onClick={() => setShowPrintModal(false)}>
                            <div className="bg-white w-full max-w-4xl h-[90vh] overflow-y-auto rounded-xl shadow-2xl p-8 relative cursor-default" onClick={e => e.stopPropagation()}>
                                <button 
                                    onClick={() => setShowPrintModal(false)}
                                    className="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-600 no-print"
                                >
                                    <XCircle size={32} />
                                </button>
                                <div className="mb-8 border-b border-slate-200 pb-4">
                                    <div className="flex items-center space-x-3 mb-2">
                                        <div className="p-2 bg-indigo-600 rounded text-white print:bg-black">
                                            <Package size={24} />
                                        </div>
                                        <h1 className="text-2xl font-bold text-slate-900">Filament Inventory Report</h1>
                                    </div>
                                    <div className="flex justify-between items-end">
                                        <p className="text-sm text-slate-500">
                                            Generated on {new Date().toLocaleDateString()}
                                        </p>
                                        <div className="text-right">
                                            <p className="font-bold text-slate-900">Filtered Items: {filteredInventory.length}</p>
                                        </div>
                                    </div>
                                </div>
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="border-b-2 border-slate-800 text-sm uppercase tracking-wider text-slate-600">
                                            <th className="py-3 pr-4">Brand</th>
                                            <th className="py-3 pr-4">Type</th>
                                            <th className="py-3 pr-4">Color/Loc</th>
                                            <th className="py-3 pr-4 text-center">Full</th>
                                            <th className="py-3 pr-4 text-right">Partial (g)</th>
                                            <th className="py-3 text-right">Total Weight</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm text-slate-800">
                                        {filteredInventory.map((item) => {
                                            const partialWeight = item.partials?.reduce((a, b) => a + (parseInt(b.weight) || 0), 0) || 0;
                                            const totalWeight = ((parseInt(item.fullRolls) || 0) * 1000) + partialWeight;
                                            return (
                                                <tr key={item.id} className="border-b border-slate-200 hover:bg-slate-50 print:hover:bg-white break-inside-avoid">
                                                    <td className="py-3 pr-4 font-medium">{item.brand}</td>
                                                    <td className="py-3 pr-4">{item.type}</td>
                                                    <td className="py-3 pr-4">
                                                        <div>{item.colorName}</div>
                                                        {item.location && (
                                                            <div className="text-xs text-slate-500 flex items-center mt-0.5">
                                                                <MapPin size={10} className="mr-1"/>
                                                                {item.location}
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="py-3 pr-4 text-center font-bold">
                                                        {item.fullRolls}
                                                        {item.orderedRolls > 0 && <span className="text-xs text-amber-600 ml-1 font-normal">+{item.orderedRolls} ord.</span>}
                                                    </td>
                                                    <td className="py-3 pr-4 text-right">{item.partials?.length > 0 ? item.partials.map(p => p.weight).join(', ') : '-'}</td>
                                                    <td className="py-3 text-right font-mono">{totalWeight < 1000 ? `${totalWeight}g` : `${(totalWeight/1000).toFixed(2)}kg`}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                                <div className="mt-8 border-t border-slate-200 pt-4 flex justify-between text-sm text-slate-500">
                                    <p>Lucy's Filament Tracker</p>
                                    <div className="text-right">
                                        <p>Total Inventory Value: ${stats.totalValue.toFixed(2)}</p>
                                        <p className="font-bold text-slate-800">Filtered Value: ${filteredStats.value.toFixed(2)}</p>
                                    </div>
                                </div>
                                <div className="mt-8 flex justify-end no-print">
                                    <button 
                                        onClick={() => window.print()}
                                        className="bg-indigo-600 text-white px-6 py-3 rounded-lg font-bold shadow-lg"
                                    >
                                        Print List
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteTarget && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm no-print cursor-pointer" onClick={() => setDeleteTarget(null)}>
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm cursor-default" onClick={e => e.stopPropagation()}>
                                <div className="flex flex-col items-center text-center">
                                    <div className="h-12 w-12 bg-red-100 rounded-full flex items-center justify-center mb-4 text-red-600"><AlertTriangle size={24} /></div>
                                    <h3 className="text-lg font-bold text-slate-900 mb-2">Delete Filament?</h3>
                                    <p className="text-slate-500 text-sm mb-6">Are you sure you want to delete <span className="font-bold text-slate-700">{deleteTarget.colorName}</span>?</p>
                                    <div className="flex space-x-3 w-full">
                                        <button onClick={() => setDeleteTarget(null)} className="flex-1 px-4 py-2 bg-white border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50">Cancel</button>
                                        <button onClick={() => { setInventory(prev => prev.filter(i => i.id !== deleteTarget.id)); setDeleteTarget(null); }} className="flex-1 px-4 py-2 bg-red-600 rounded-lg text-white font-medium hover:bg-red-700 shadow-sm">Delete</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showClearConfirm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm no-print cursor-pointer" onClick={() => setShowClearConfirm(false)}>
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm cursor-default" onClick={e => e.stopPropagation()}>
                                <div className="flex flex-col items-center text-center">
                                    <div className="h-12 w-12 bg-red-100 rounded-full flex items-center justify-center mb-4 text-red-600"><Trash2 size={24} /></div>
                                    <h3 className="text-lg font-bold text-slate-900 mb-2">Clear Inventory?</h3>
                                    <p className="text-slate-500 text-sm mb-6">This will remove <strong>{inventory.length}</strong> spools.</p>
                                    <div className="flex space-x-3 w-full">
                                        <button onClick={() => setShowClearConfirm(false)} className="flex-1 px-4 py-2 bg-white border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50">Cancel</button>
                                        <button onClick={() => {setInventory([]); setShowClearConfirm(false);}} className="flex-1 px-4 py-2 bg-red-600 rounded-lg text-white font-medium hover:bg-red-700 shadow-sm">Clear All</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showForm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm no-print cursor-pointer" onClick={closeForm}>
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto cursor-default" onClick={e => e.stopPropagation()}>
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
                                    <h2 className="text-xl font-bold text-slate-800">{editingId ? 'Edit Filament' : 'Add New Filament'}</h2>
                                    <button onClick={closeForm} className="text-slate-400 hover:text-slate-600"><XCircle size={24} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-6 space-y-6">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Brand</label><input required name="brand" value={formData.brand} onChange={handleInputChange} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Type</label><input required name="type" value={formData.type} onChange={handleInputChange} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium text-slate-700 mb-1">Color Name</label><input required name="colorName" value={formData.colorName} onChange={handleInputChange} className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Hex Color</label>
                                            <div className="flex space-x-2">
                                                <input type="color" name="hexColor" value={formData.hexColor} onChange={handleInputChange} className="h-10 w-10 p-1 rounded border border-slate-300 cursor-pointer" />
                                                <input type="text" name="hexColor" value={formData.hexColor} onChange={handleInputChange} className="flex-1 p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none uppercase" />
                                            </div>
                                        </div>
                                    </div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Storage Location</label><input name="location" value={formData.location} onChange={handleInputChange} placeholder="e.g. Shelf 2, Dry Box A" className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                                    <div className="border-t border-slate-100 pt-4">
                                        <h3 className="text-sm font-semibold text-slate-900 mb-4 uppercase tracking-wider">Inventory & Cost</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                            <div><label className="block text-sm font-medium text-slate-700 mb-1">Full Rolls</label><input type="number" min="0" name="fullRolls" value={formData.fullRolls} onChange={handleInputChange} className="w-full p-2 border border-slate-300 rounded-lg outline-none" /></div>
                                            <div><label className="block text-sm font-medium text-slate-700 mb-1">Ordered</label><input type="number" min="0" name="orderedRolls" value={formData.orderedRolls} onChange={handleInputChange} className="w-full p-2 border border-slate-300 rounded-lg outline-none" /></div>
                                            <div><label className="block text-sm font-medium text-slate-700 mb-1">Price ($)</label><input type="number" min="0" step="0.01" name="price" value={formData.price} onChange={handleInputChange} className="w-full p-2 border border-slate-300 rounded-lg outline-none" /></div>
                                            <div><label className="block text-sm font-medium text-slate-700 mb-1">Tare (g)</label><input type="number" name="spoolWeight" value={formData.spoolWeight} onChange={handleInputChange} className="w-full p-2 border border-slate-300 rounded-lg outline-none" /></div>
                                        </div>
                                    </div>
                                    <div className="border-t border-slate-100 pt-4">
                                        <h3 className="text-sm font-semibold text-slate-900 mb-4 uppercase tracking-wider">Notes</h3>
                                        <textarea name="notes" value={formData.notes} onChange={handleInputChange} rows={3} className="w-full p-2 border border-slate-300 rounded-lg outline-none" />
                                    </div>
                                    <div className="pt-6 border-t border-slate-100 flex justify-end space-x-3">
                                        <button type="button" onClick={closeForm} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg">Cancel</button>
                                        <button type="submit" className="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-md transition-colors">{editingId ? 'Save' : 'Add'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
